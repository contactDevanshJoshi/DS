<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile - DS Quiz App</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
    
    * {
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #f8f7ff 0%, #eff6ff 50%, #f0fdf4 100%);
      height: 100%;
      overflow: auto;
      padding: 2rem 1rem;
    }

    .profile-wrapper {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeIn 0.6s ease-out 0.1s backwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .profile-title {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0 0 0.5rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .profile-card {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      margin-bottom: 2rem;
      animation: fadeIn 0.6s ease-out 0.2s backwards;
    }

    .student-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid #f1f5f9;
      margin-bottom: 2rem;
      animation: slideIn 0.6s ease-out 0.3s backwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar i {
      width: 48px;
      height: 48px;
      color: white;
    }

    .student-info h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0;
    }

    .student-info p {
      font-size: 0.9rem;
      color: #94a3b8;
      margin: 0.25rem 0 0 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1.25rem;
      text-align: center;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
      animation: scaleIn 0.6s ease-out backwards;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .stat-box:nth-child(1) { animation-delay: 0.35s; }
    .stat-box:nth-child(2) { animation-delay: 0.4s; }
    .stat-box:nth-child(3) { animation-delay: 0.45s; }

    .stat-box:hover {
      border-color: #cbd5e1;
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
    }

    .divider {
      height: 2px;
      background: #f1f5f9;
      margin: 2rem 0;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeIn 0.6s ease-out 0.5s backwards;
    }

    .btn {
      padding: 1rem 1.5rem;
      border-radius: 0.875rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #1e293b;
      border: 2px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
      transform: translateY(-2px);
    }

    .btn-secondary:active {
      transform: translateY(0);
    }

    .btn i {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .profile-card {
        padding: 1.5rem;
      }

      .profile-title {
        font-size: 1.5rem;
      }

      .student-header {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
      }

      .student-info h2 {
        font-size: 1.25rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .stat-label {
        font-size: 0.7rem;
      }

      .stat-value {
        font-size: 1.25rem;
      }

      .avatar {
        width: 70px;
        height: 70px;
      }

      .avatar i {
        width: 42px;
        height: 42px;
      }
    }
  </style>

  <script>
    let config = {
      profile_title: 'Student Profile',
      student_name: 'Alex Johnson',
      enrollment_label: 'Enrollment Number',
      enrollment_number: 'DS2024001',
      quizzes_label: 'Quizzes Attempted',
      quizzes_count: '12',
      average_score_label: 'Average Score',
      average_score: '78%',
      change_password_btn: 'Change Password',
      logout_btn: 'Logout'
    };

    const defaultConfig = {
      profile_title: 'Student Profile',
      student_name: 'Alex Johnson',
      enrollment_label: 'Enrollment Number',
      enrollment_number: 'DS2024001',
      quizzes_label: 'Quizzes Attempted',
      quizzes_count: '12',
      average_score_label: 'Average Score',
      average_score: '78%',
      change_password_btn: 'Change Password',
      logout_btn: 'Logout'
    };

    async function initializeSDK() {
      await window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (updatedConfig) => {
          config = updatedConfig;
          document.getElementById('profileTitle').textContent = config.profile_title || defaultConfig.profile_title;
          document.getElementById('studentName').textContent = config.student_name || defaultConfig.student_name;
          document.getElementById('enrollmentLabel').innerHTML = `${config.enrollment_label || defaultConfig.enrollment_label}: <strong id="enrollmentValue">${config.enrollment_number || defaultConfig.enrollment_number}</strong>`;
          document.getElementById('enrollmentNumberTop').textContent = config.enrollment_number || defaultConfig.enrollment_number;
          document.getElementById('enrollmentLabelTop').textContent = config.enrollment_label || defaultConfig.enrollment_label;
          document.getElementById('quizzesLabel').textContent = config.quizzes_label || defaultConfig.quizzes_label;
          document.getElementById('quizzesCount').textContent = config.quizzes_count || defaultConfig.quizzes_count;
          document.getElementById('averageLabel').textContent = config.average_score_label || defaultConfig.average_score_label;
          document.getElementById('averageScore').textContent = config.average_score || defaultConfig.average_score;
          document.getElementById('changePasswordText').textContent = config.change_password_btn || defaultConfig.change_password_btn;
          document.getElementById('logoutText').textContent = config.logout_btn || defaultConfig.logout_btn;
        },
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: () => new Map([
          ['profile_title', config.profile_title || defaultConfig.profile_title],
          ['student_name', config.student_name || defaultConfig.student_name],
          ['enrollment_label', config.enrollment_label || defaultConfig.enrollment_label],
          ['enrollment_number', config.enrollment_number || defaultConfig.enrollment_number],
          ['quizzes_label', config.quizzes_label || defaultConfig.quizzes_label],
          ['quizzes_count', config.quizzes_count || defaultConfig.quizzes_count],
          ['average_score_label', config.average_score_label || defaultConfig.average_score_label],
          ['average_score', config.average_score || defaultConfig.average_score],
          ['change_password_btn', config.change_password_btn || defaultConfig.change_password_btn],
          ['logout_btn', config.logout_btn || defaultConfig.logout_btn]
        ])
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.elementSdk) {
        initializeSDK();
      }

      lucide.createIcons();

      // Button event handlers
      document.getElementById('changePasswordBtn').addEventListener('click', () => {
        alert('Change Password feature would open a modal here');
      });

      document.getElementById('logoutBtn').addEventListener('click', () => {
        alert('Logout successful! Redirecting to login...');
      });
    });
  </script>

<script>

// ================= GLOBAL AUTH =================
const page = location.pathname.split("/").pop();

if(page !== "index.html" && !localStorage.getItem("user")){
  location.href = "index.html";
}

// ================= LOGIN =================
const form = document.getElementById("loginForm");

if(form){
  form.onsubmit = (e)=>{
    e.preventDefault();

    let enroll = document.getElementById("enrollment").value.trim();

    if(!enroll){
      document.getElementById("errorMessage").style.display="block";
      return;
    }

    localStorage.setItem("user", enroll);
    location.href="dashboard.html";
  };
}

// ================= DASHBOARD =================
const unitCards = document.querySelectorAll(".unit-card");

if(unitCards.length){
  unitCards.forEach(card=>{
    card.onclick=()=>{
      let unit = card.querySelector(".unit-title").innerText;
      localStorage.setItem("unit", unit);
      location.href="difficulty.html";
    };
  });
}

// ================= PROFILE ICON =================
const profileIcon = document.querySelector(".profile-icon");
if(profileIcon){
  profileIcon.onclick=()=>location.href="profile.html";
}

// ================= DIFFICULTY =================
const diffCards = document.querySelectorAll(".difficulty-card");

if(diffCards.length){

  diffCards.forEach(card=>{
    card.onclick=()=>{
      let d = card.getAttribute("data-difficulty");
      localStorage.setItem("difficulty", d);
      setTimeout(()=>location.href="quiz.html",400);
    };
  });

}

// ================= QUIZ =================
const questionText = document.getElementById("questionText");

if(questionText){

let questions = [
 {q:"What is Array?",o:["DS","Loop","Func","Var"],a:0},
 {q:"Stack follows?",o:["FIFO","LIFO","None","Both"],a:1},
 {q:"Queue follows?",o:["FIFO","LIFO","None","Both"],a:0},
 {q:"Which DS is linear?",o:["Array","Tree","Graph","Heap"],a:0}
];

questions = questions.sort(()=>Math.random()-0.5);

let index=0, score=0;

const opts = document.querySelectorAll(".option-button");
const next = document.getElementById("nextButton");

function load(){
 let q=questions[index];

 document.getElementById("questionText").innerText=q.q;

 document.getElementById("option0").innerText=q.o[0];
 document.getElementById("option1").innerText=q.o[1];
 document.getElementById("option2").innerText=q.o[2];
 document.getElementById("option3").innerText=q.o[3];

 document.getElementById("currentQuestion").innerText=index+1;
 document.getElementById("questionNumber").innerText=index+1;
 document.getElementById("totalQuestions").innerText=questions.length;
 document.getElementById("questionTotal").innerText=questions.length;

 document.getElementById("progressBar").style.width =
  ((index)/questions.length)*100+"%";
}

opts.forEach((b,i)=>{
 b.onclick=()=>{
   opts.forEach(x=>x.classList.remove("selected"));
   b.classList.add("selected");

   if(i===questions[index].a) score++;

   next.disabled=false;
 };
});

next.onclick=()=>{
 index++;

 if(index<questions.length){
   load();
 }else{
   localStorage.setItem("score",score);
   localStorage.setItem("total",questions.length);

   let results = JSON.parse(localStorage.getItem("results"))||{};
   let unit = localStorage.getItem("unit");
   results[unit]={score,total:questions.length};
   localStorage.setItem("results",JSON.stringify(results));

   location.href="result.html";
 }
};

load();
}

// ================= RESULT =================
if(document.getElementById("scoreNumber")){

let s = Number(localStorage.getItem("score"))||0;
let t = Number(localStorage.getItem("total"))||0;

document.getElementById("scoreNumber").innerText=s;
document.getElementById("scoreTotal").innerText=t;

let p = Math.round((s/t)*100);
document.getElementById("percentage").innerText=p+"%";

document.getElementById("retryBtn").onclick=()=>{
 location.href="difficulty.html";
};

document.getElementById("dashboardBtn").onclick=()=>{
 location.href="dashboard.html";
};

}

// ================= ANALYSIS =================
if(document.getElementById("analysisPage")){

let data = JSON.parse(localStorage.getItem("results"))||{};

for(let unit in data){
 console.log(unit, data[unit]);
}

}

// ================= PROFILE =================
if(document.getElementById("profilePage")){

let user = localStorage.getItem("user");

document.getElementById("studentName").innerText=user;
document.getElementById("enrollmentValue").innerText=user;

document.getElementById("logoutBtn").onclick=()=>{
 localStorage.clear();
 location.href="index.html";
};

}

</script>
