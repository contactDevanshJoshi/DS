  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
    
    * {
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #dbeafe 100%);
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .results-container {
      width: 100%;
      max-width: 600px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .results-card {
      background: white;
      border-radius: 2rem;
      padding: 3rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .celebration-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: bounce 0.6s ease-out 0.2s backwards;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    .results-title {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0 0 0.5rem 0;
      animation: fadeIn 0.6s ease-out 0.3s backwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .score-section {
      margin: 2.5rem 0;
      animation: fadeIn 0.6s ease-out 0.4s backwards;
    }

    .circular-progress {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 2rem;
    }

    svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .progress-background {
      fill: none;
      stroke: #e2e8f0;
      stroke-width: 12;
    }

    .progress-fill {
      fill: none;
      stroke: #22c55e;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease;
      stroke-dasharray: 628;
      stroke-dashoffset: 628;
      animation: fillProgress 1.5s ease-out 0.5s forwards;
    }

    @keyframes fillProgress {
      to {
        stroke-dashoffset: 188;
      }
    }

    .score-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1;
    }

    .score-total {
      font-size: 1.1rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .percentage {
      font-size: 1.5rem;
      font-weight: 700;
      color: #22c55e;
      margin: 1rem 0;
      animation: fadeIn 0.6s ease-out 0.6s backwards;
    }

    .message {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.5rem;
      animation: fadeIn 0.6s ease-out 0.7s backwards;
    }

    .message-description {
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 2.5rem;
      animation: fadeIn 0.6s ease-out 0.8s backwards;
    }

    .results-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeIn 0.6s ease-out 0.9s backwards;
    }

    .btn {
      padding: 1rem 2rem;
      border: none;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      border: 2px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
      transform: translateY(-3px);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    @media (max-width: 600px) {
      .results-card {
        padding: 2rem;
        border-radius: 1.5rem;
      }

      .results-title {
        font-size: 1.75rem;
      }

      .circular-progress {
        width: 160px;
        height: 160px;
      }

      .score-number {
        font-size: 2rem;
      }

      .message {
        font-size: 1.1rem;
      }

      .btn {
        padding: 0.875rem 1.5rem;
        font-size: 0.95rem;
      }

      .results-actions {
        flex-direction: column;
      }
    }

  <script>
    let config = {
      results_title: 'Quiz Complete!',
      excellent_message: 'Outstanding Performance!',
      good_message: 'Great Job!',
      needs_improvement_message: 'Keep Practicing!',
      retry_button: 'Retry Quiz',
      dashboard_button: 'Go to Dashboard'
    };

    const defaultConfig = {
      results_title: 'Quiz Complete!',
      excellent_message: 'Outstanding Performance!',
      good_message: 'Great Job!',
      needs_improvement_message: 'Keep Practicing!',
      retry_button: 'Retry Quiz',
      dashboard_button: 'Go to Dashboard'
    };

    const score;
    const total;
    const percentage = Math.round((score / total) * 100);

    function getPerformanceMessage(pct) {
      if (pct >= 80) {
        return config.excellent_message || defaultConfig.excellent_message;
      } else if (pct >= 60) {
        return config.good_message || defaultConfig.good_message;
      } else {
        return config.needs_improvement_message || defaultConfig.needs_improvement_message;
      }
    }

    function getMessageDescription(pct) {
      if (pct >= 80) {
        return 'You demonstrated excellent understanding! Keep up the great work!';
      } else if (pct >= 60) {
        return 'You demonstrated solid understanding. Keep practicing to master all topics!';
      } else {
        return 'Review the material and try again. Every attempt brings you closer to mastery!';
      }
    }

    async function initializeSDK() {
      await window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (updatedConfig) => {
          config = updatedConfig;
          document.getElementById('resultsTitle').textContent = config.results_title || defaultConfig.results_title;
          document.getElementById('performanceMessage').textContent = getPerformanceMessage(percentage);
          document.getElementById('messageDescription').textContent = getMessageDescription(percentage);
          document.getElementById('retryText').textContent = config.retry_button || defaultConfig.retry_button;
          document.getElementById('dashboardText').textContent = config.dashboard_button || defaultConfig.dashboard_button;
        },
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: () => new Map([
          ['results_title', config.results_title || defaultConfig.results_title],
          ['excellent_message', config.excellent_message || defaultConfig.excellent_message],
          ['good_message', config.good_message || defaultConfig.good_message],
          ['needs_improvement_message', config.needs_improvement_message || defaultConfig.needs_improvement_message],
          ['retry_button', config.retry_button || defaultConfig.retry_button],
          ['dashboard_button', config.dashboard_button || defaultConfig.dashboard_button]
        ])
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.elementSdk) {
        initializeSDK();
      }

      document.getElementById('scoreNumber').textContent = score;
      document.getElementById('scoreTotal').textContent = total;
      document.getElementById('percentage').textContent = percentage + '%';
      document.getElementById('performanceMessage').textContent = getPerformanceMessage(percentage);
      document.getElementById('messageDescription').textContent = getMessageDescription(percentage);

      document.getElementById('retryBtn').addEventListener('click', () => {
        // Action for retrying the quiz
        console.log('Retry quiz clicked');
      });

      document.getElementById('dashboardBtn').addEventListener('click', () => {
        // Action for going to dashboard
        console.log('Go to dashboard clicked');
      });

      lucide.createIcons();
    });
  </script>

<script>

// ================= GLOBAL AUTH =================
const page = location.pathname.split("/").pop();

if(page !== "index.html" && !localStorage.getItem("user")){
  location.href = "index.html";
}

// ================= LOGIN =================
const form = document.getElementById("loginForm");

if(form){
  form.onsubmit = (e)=>{
    e.preventDefault();

    let enroll = document.getElementById("enrollment").value.trim();

    if(!enroll){
      document.getElementById("errorMessage").style.display="block";
      return;
    }

    localStorage.setItem("user", enroll);
    location.href="dashboard.html";
  };
}

// ================= DASHBOARD =================
const unitCards = document.querySelectorAll(".unit-card");

if(unitCards.length){
  unitCards.forEach(card=>{
    card.onclick=()=>{
      let unit = card.querySelector(".unit-title").innerText;
      localStorage.setItem("unit", unit);
      location.href="difficulty.html";
    };
  });
}

// ================= PROFILE ICON =================
const profileIcon = document.querySelector(".profile-icon");
if(profileIcon){
  profileIcon.onclick=()=>location.href="profile.html";
}

// ================= DIFFICULTY =================
const diffCards = document.querySelectorAll(".difficulty-card");

if(diffCards.length){

  diffCards.forEach(card=>{
    card.onclick=()=>{
      let d = card.getAttribute("data-difficulty");
      localStorage.setItem("difficulty", d);
      setTimeout(()=>location.href="quiz.html",400);
    };
  });

}

// ================= QUIZ =================
const questionText = document.getElementById("questionText");

if(questionText){

let questions = [
 {q:"What is Array?",o:["DS","Loop","Func","Var"],a:0},
 {q:"Stack follows?",o:["FIFO","LIFO","None","Both"],a:1},
 {q:"Queue follows?",o:["FIFO","LIFO","None","Both"],a:0},
 {q:"Which DS is linear?",o:["Array","Tree","Graph","Heap"],a:0}
];

questions = questions.sort(()=>Math.random()-0.5);

let index=0, score=0;

const opts = document.querySelectorAll(".option-button");
const next = document.getElementById("nextButton");

function load(){
 let q=questions[index];

 document.getElementById("questionText").innerText=q.q;

 document.getElementById("option0").innerText=q.o[0];
 document.getElementById("option1").innerText=q.o[1];
 document.getElementById("option2").innerText=q.o[2];
 document.getElementById("option3").innerText=q.o[3];

 document.getElementById("currentQuestion").innerText=index+1;
 document.getElementById("questionNumber").innerText=index+1;
 document.getElementById("totalQuestions").innerText=questions.length;
 document.getElementById("questionTotal").innerText=questions.length;

 document.getElementById("progressBar").style.width =
  ((index)/questions.length)*100+"%";
}

opts.forEach((b,i)=>{
 b.onclick=()=>{
   opts.forEach(x=>x.classList.remove("selected"));
   b.classList.add("selected");

   if(i===questions[index].a) score++;

   next.disabled=false;
 };
});

next.onclick=()=>{
 index++;

 if(index<questions.length){
   load();
 }else{
   localStorage.setItem("score",score);
   localStorage.setItem("total",questions.length);

   let results = JSON.parse(localStorage.getItem("results"))||{};
   let unit = localStorage.getItem("unit");
   results[unit]={score,total:questions.length};
   localStorage.setItem("results",JSON.stringify(results));

   location.href="result.html";
 }
};

load();
}

// ================= RESULT =================
if(document.getElementById("scoreNumber")){

let s = Number(localStorage.getItem("score"))||0;
let t = Number(localStorage.getItem("total"))||0;

document.getElementById("scoreNumber").innerText=s;
document.getElementById("scoreTotal").innerText=t;

let p = Math.round((s/t)*100);
document.getElementById("percentage").innerText=p+"%";

document.getElementById("retryBtn").onclick=()=>{
 location.href="difficulty.html";
};

document.getElementById("dashboardBtn").onclick=()=>{
 location.href="dashboard.html";
};

}

// ================= ANALYSIS =================
if(document.getElementById("analysisPage")){

let data = JSON.parse(localStorage.getItem("results"))||{};

for(let unit in data){
 console.log(unit, data[unit]);
}

}

// ================= PROFILE =================
if(document.getElementById("profilePage")){

let user = localStorage.getItem("user");

document.getElementById("studentName").innerText=user;
document.getElementById("enrollmentValue").innerText=user;

document.getElementById("logoutBtn").onclick=()=>{
 localStorage.clear();
 location.href="index.html";
};

}

</script>

<script type="module">

import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let user = localStorage.getItem("user");
let unit = localStorage.getItem("unit");
let diff = localStorage.getItem("difficulty");

let score = Number(localStorage.getItem("score"));
let total = Number(localStorage.getItem("total"));

await setDoc(doc(db,"results",user),{
  [unit+"_"+diff]: {
    score:score,
    total:total,
    time:Date.now()
  }
},{merge:true});

// show UI
scoreNumber.innerText=score;
scoreTotal.innerText=total;

</script>
