<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - DS Quiz App</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
    
    * {
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #f8f7ff 0%, #eff6ff 50%, #f0fdf4 100%);
      height: 100%;
      overflow: auto;
      padding: 2rem 1rem;
    }

    .admin-wrapper {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-content h1 i {
      width: 36px;
      height: 36px;
      color: #3b82f6;
    }

    .header-content p {
      font-size: 0.95rem;
      color: #64748b;
      margin: 0.5rem 0 0 0;
    }

    .admin-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .admin-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
    }

    .admin-avatar i {
      width: 32px;
      height: 32px;
      color: white;
    }

    .card {
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      margin-bottom: 2rem;
      animation: fadeInUp 0.6s ease-out backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0 0 1.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-title i {
      width: 24px;
      height: 24px;
      color: #3b82f6;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="text"], textarea {
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 1rem;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      background: #f8fafc;
    }

    select:focus, input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-size: 0.9rem;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 640px) {
      .option-grid {
        grid-template-columns: 1fr;
      }
    }

    .divider {
      height: 2px;
      background: #f1f5f9;
      margin: 2rem 0;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 0.875rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .btn i {
      width: 18px;
      height: 18px;
    }

    .upload-box {
      border: 2px dashed #cbd5e1;
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      background: #f8fafc;
    }

    .upload-box:hover {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .upload-box i {
      width: 48px;
      height: 48px;
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    .upload-box p {
      font-size: 0.95rem;
      color: #64748b;
      margin: 0;
    }

    .upload-box .highlight {
      color: #3b82f6;
      font-weight: 600;
    }

    .questions-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .question-item {
      background: #f8fafc;
      border-left: 4px solid #3b82f6;
      padding: 1rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      animation: slideInLeft 0.4s ease-out;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .question-item h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e293b;
      margin: 0 0 0.5rem 0;
    }

    .question-item p {
      font-size: 0.85rem;
      color: #64748b;
      margin: 0.25rem 0;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
    }

    .empty-state i {
      width: 48px;
      height: 48px;
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #10b981;
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 0.875rem;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
      animation: slideInRight 0.4s ease-out;
      z-index: 1000;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(400px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
      }

      .header-content h1 {
        font-size: 1.5rem;
      }

      .card {
        padding: 1.5rem;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .upload-box {
        padding: 1.5rem;
      }

      .toast {
        left: 1rem;
        right: 1rem;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="admin-wrapper"><!-- Header -->
   <div class="admin-header">
    <div class="header-content">
     <h1><i data-lucide="settings"></i><span id="adminTitle">Admin Panel</span></h1>
     <p id="adminSubtitle">Manage Questions</p>
    </div>
    <div class="admin-avatar"><i data-lucide="user"></i>
    </div>
   </div><!-- Filter Card -->
   <div class="card">
    <div class="filter-grid">
     <div class="form-group"><label class="form-label" id="unitLabelText">Select Unit</label> <select id="unitSelect"> <option>Unit 1 - Arrays</option> <option>Unit 2 - Stack</option> <option>Unit 3 - Expressions</option> <option>Unit 4 - Queue</option> </select>
     </div>
     <div class="form-group"><label class="form-label" id="difficultyLabelText">Select Difficulty</label> <select id="difficultySelect"> <option>Easy</option> <option>Medium</option> <option>Hard</option> </select>
     </div>
    </div>
   </div><!-- Add Question Card -->
   <div class="card">
    <h2 class="section-title"><i data-lucide="plus-circle"></i> Add Question</h2>
    <div class="form-group" style="margin-bottom: 1.5rem;"><label class="form-label" id="questionLabelText">Question Text</label> <textarea id="questionInput" placeholder="Enter your question here..."></textarea>
    </div>
    <div class="option-grid">
     <div class="form-group"><label class="form-label">Option 1</label> <input type="text" id="option1" placeholder="Enter option 1">
     </div>
     <div class="form-group"><label class="form-label">Option 2</label> <input type="text" id="option2" placeholder="Enter option 2">
     </div>
     <div class="form-group"><label class="form-label">Option 3</label> <input type="text" id="option3" placeholder="Enter option 3">
     </div>
     <div class="form-group"><label class="form-label">Option 4</label> <input type="text" id="option4" placeholder="Enter option 4">
     </div>
    </div>
    <div class="form-group" style="margin-bottom: 1.5rem;"><label class="form-label">Correct Answer Index (0-3)</label> <input type="text" id="correctAnswerIndex" placeholder="0" maxlength="1">
    </div><button class="btn btn-primary" id="addQuestionBtn"> <i data-lucide="plus"></i> <span id="addQuestionText">Add Question</span> </button>
   </div><!-- Divider -->
   <div class="divider"></div><!-- Bulk Upload Card -->
   <div class="card">
    <h2 class="section-title"><i data-lucide="upload"></i> <span id="bulkUploadTitle">Upload Questions (CSV)</span></h2>
    <div class="upload-box" id="uploadBox"><i data-lucide="cloud-upload"></i>
     <p>Drag and drop your CSV file here, or <span class="highlight">click to browse</span></p><input type="file" id="csvFile" style="display: none;" accept=".csv">
    </div><button class="btn btn-success" id="uploadBtn" style="margin-top: 1.5rem; width: 100%;"> <i data-lucide="upload"></i> <span id="uploadBtnText">Upload CSV</span> </button>
   </div><!-- Questions List Card -->
   <div class="card">
    <h2 class="section-title"><i data-lucide="list"></i> <span id="questionsListTitle">Added Questions</span></h2>
    <div class="questions-list" id="questionsList">
     <div class="empty-state"><i data-lucide="inbox"></i>
      <p>No questions added yet. Add your first question above!</p>
     </div>
    </div>
   </div>
  </div>
  <script>
    let config = {
      admin_title: 'Admin Panel',
      manage_subtitle: 'Manage Questions',
      unit_label: 'Select Unit',
      difficulty_label: 'Select Difficulty',
      question_label: 'Question Text',
      add_question_btn: 'Add Question',
      bulk_upload_title: 'Upload Questions (CSV)',
      upload_btn: 'Upload CSV',
      questions_list_title: 'Added Questions'
    };

    const defaultConfig = { ...config };
    let addedQuestions = [];

    async function initializeSDK() {
      await window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (updatedConfig) => {
          config = updatedConfig;
          document.getElementById('adminTitle').textContent = config.admin_title || defaultConfig.admin_title;
          document.getElementById('adminSubtitle').textContent = config.manage_subtitle || defaultConfig.manage_subtitle;
          document.getElementById('unitLabelText').textContent = config.unit_label || defaultConfig.unit_label;
          document.getElementById('difficultyLabelText').textContent = config.difficulty_label || defaultConfig.difficulty_label;
          document.getElementById('questionLabelText').textContent = config.question_label || defaultConfig.question_label;
          document.getElementById('addQuestionText').textContent = config.add_question_btn || defaultConfig.add_question_btn;
          document.getElementById('bulkUploadTitle').textContent = config.bulk_upload_title || defaultConfig.bulk_upload_title;
          document.getElementById('uploadBtnText').textContent = config.upload_btn || defaultConfig.upload_btn;
          document.getElementById('questionsListTitle').textContent = config.questions_list_title || defaultConfig.questions_list_title;
        },
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: () => new Map([
          ['admin_title', config.admin_title || defaultConfig.admin_title],
          ['manage_subtitle', config.manage_subtitle || defaultConfig.manage_subtitle],
          ['unit_label', config.unit_label || defaultConfig.unit_label],
          ['difficulty_label', config.difficulty_label || defaultConfig.difficulty_label],
          ['question_label', config.question_label || defaultConfig.question_label],
          ['add_question_btn', config.add_question_btn || defaultConfig.add_question_btn],
          ['bulk_upload_title', config.bulk_upload_title || defaultConfig.bulk_upload_title],
          ['upload_btn', config.upload_btn || defaultConfig.upload_btn],
          ['questions_list_title', config.questions_list_title || defaultConfig.questions_list_title]
        ])
      });
    }

    function renderQuestions() {
      const list = document.getElementById('questionsList');
      if (addedQuestions.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i data-lucide="inbox"></i>
            <p>No questions added yet. Add your first question above!</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = addedQuestions.map((q, idx) => `
        <div class="question-item">
          <h4>Q${idx + 1}: ${q.question.substring(0, 50)}${q.question.length > 50 ? '...' : ''}</h4>
          <p><strong>Unit:</strong> ${q.unit}</p>
          <p><strong>Difficulty:</strong> ${q.difficulty}</p>
          <p><strong>Options:</strong> ${q.options.join(', ')}</p>
          <p><strong>Correct Answer:</strong> ${q.options[q.correctAnswer]}</p>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.elementSdk) {
        initializeSDK();
      }

      lucide.createIcons();

      // Add Question Button
      document.getElementById('addQuestionBtn').addEventListener('click', () => {
        const question = document.getElementById('questionInput').value.trim();
        const option1 = document.getElementById('option1').value.trim();
        const option2 = document.getElementById('option2').value.trim();
        const option3 = document.getElementById('option3').value.trim();
        const option4 = document.getElementById('option4').value.trim();
        const correctIdx = parseInt(document.getElementById('correctAnswerIndex').value);
        const unit = document.getElementById('unitSelect').value;
        const difficulty = document.getElementById('difficultySelect').value;

        if (!question || !option1 || !option2 || !option3 || !option4 || isNaN(correctIdx) || correctIdx < 0 || correctIdx > 3) {
          showToast('Please fill all fields correctly');
          return;
        }

        addedQuestions.push({
          question,
          options: [option1, option2, option3, option4],
          correctAnswer: correctIdx,
          unit,
          difficulty
        });

        document.getElementById('questionInput').value = '';
        document.getElementById('option1').value = '';
        document.getElementById('option2').value = '';
        document.getElementById('option3').value = '';
        document.getElementById('option4').value = '';
        document.getElementById('correctAnswerIndex').value = '';

        renderQuestions();
        showToast('Question added successfully!');
      });

      // Upload Box Click
      document.getElementById('uploadBox').addEventListener('click', () => {
        document.getElementById('csvFile').click();
      });

      document.getElementById('uploadBox').addEventListener('dragover', (e) => {
        e.preventDefault();
        document.getElementById('uploadBox').style.borderColor = '#3b82f6';
        document.getElementById('uploadBox').style.background = '#eff6ff';
      });

      document.getElementById('uploadBox').addEventListener('dragleave', () => {
        document.getElementById('uploadBox').style.borderColor = '#cbd5e1';
        document.getElementById('uploadBox').style.background = '#f8fafc';
      });

      document.getElementById('uploadBox').addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.csv')) {
          document.getElementById('csvFile').files = e.dataTransfer.files;
          showToast('CSV file ready to upload');
        } else {
          showToast('Please drop a CSV file');
        }
        document.getElementById('uploadBox').style.borderColor = '#cbd5e1';
        document.getElementById('uploadBox').style.background = '#f8fafc';
      });

      // Upload Button
      document.getElementById('uploadBtn').addEventListener('click', () => {
        const file = document.getElementById('csvFile').files[0];
        if (!file) {
          showToast('Please select a CSV file');
          return;
        }
        showToast('CSV uploaded! Processing...');
      });

      renderQuestions();
    });
  </script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDx6abGpJdQltTmfzllb9DRQBHvMphFR0",
  authDomain: "ds-sem2.firebaseapp.com",
  projectId: "ds-sem2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= ADD QUESTION =================
async function addQuestion(){

  let unit = document.getElementById("unitSelect").value.toLowerCase();
  let difficulty = document.getElementById("difficultySelect").value.toLowerCase();

  let q = document.getElementById("questionInput").value;

  let o = [
    document.getElementById("option1").value,
    document.getElementById("option2").value,
    document.getElementById("option3").value,
    document.getElementById("option4").value
  ];

  let a = Number(document.getElementById("correctAnswerIndex").value);

  if(!q || o.includes("") || a<0 || a>3){
    alert("Fill all fields correctly");
    return;
  }

  await addDoc(collection(db,"questions",unit,difficulty),{
    q:q,
    o:o,
    a:a
  });

  showToast("Question added ✅");
  loadQuestions();
}

// ================= LOAD =================
async function loadQuestions(){

  let unit = document.getElementById("unitSelect").value.toLowerCase();
  let difficulty = document.getElementById("difficultySelect").value.toLowerCase();

  const snap = await getDocs(collection(db,"questions",unit,difficulty));

  let list = document.getElementById("questionsContainer");
  if(!list) return;

  list.innerHTML = "";

  snap.forEach(doc=>{
    let d = doc.data();

    let div = document.createElement("div");
    div.className = "question-card"; // YOUR EXISTING STYLE

    div.innerHTML = `
      <div class="font-semibold">${d.q}</div>
      <div>1. ${d.o[0]}</div>
      <div>2. ${d.o[1]}</div>
      <div>3. ${d.o[2]}</div>
      <div>4. ${d.o[3]}</div>
      <div class="text-green-600">Answer: ${d.a}</div>
    `;

    list.appendChild(div);
  });
}

// ================= CSV =================
async function uploadCSV(){

  let file = document.getElementById("csvFile").files[0];
  if(!file){
    showToast("Select CSV first");
    return;
  }

  let reader = new FileReader();

  reader.onload = async function(e){

    let lines = e.target.result.split("\n");

    for(let line of lines){

      let [q,o1,o2,o3,o4,a,unit,diff] = line.split(",");

      if(!q) continue;

      await addDoc(collection(db,"questions",unit.trim(),diff.trim()),{
        q:q,
        o:[o1,o2,o3,o4],
        a:Number(a)
      });
    }

    showToast("CSV uploaded ✅");
    loadQuestions();
  };

  reader.readAsText(file);
}

// ================= HOOK EXISTING BUTTONS =================
document.addEventListener("DOMContentLoaded",()=>{

  // keep your UI scripts
  lucide.createIcons();

  // connect buttons (IMPORTANT)
  document.getElementById("addQuestionBtn").onclick = addQuestion;
  document.getElementById("uploadBtn").onclick = uploadCSV;

  document.getElementById("unitSelect").onchange = loadQuestions;
  document.getElementById("difficultySelect").onchange = loadQuestions;

  loadQuestions();
});

</script>
