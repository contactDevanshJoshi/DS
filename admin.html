<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen p-4">

<div class="max-w-md mx-auto bg-white p-5 rounded-2xl shadow space-y-6">

<h2 class="text-xl font-bold text-center">Admin Panel</h2>

<!-- UNIT & DIFFICULTY -->
<select id="unit" class="w-full p-2 border rounded">
<option>unit1</option>
<option>unit2</option>
<option>unit3</option>
<option>unit4</option>
</select>

<select id="difficulty" class="w-full p-2 border rounded">
<option>easy</option>
<option>medium</option>
<option>hard</option>
</select>

<!-- ADD QUESTION -->
<input id="q" placeholder="Question" class="w-full p-2 border rounded">
<input id="o1" placeholder="Option 1" class="w-full p-2 border rounded">
<input id="o2" placeholder="Option 2" class="w-full p-2 border rounded">
<input id="o3" placeholder="Option 3" class="w-full p-2 border rounded">
<input id="o4" placeholder="Option 4" class="w-full p-2 border rounded">
<input id="ans" placeholder="Answer index (0-3)" class="w-full p-2 border rounded">

<button id="addBtn" class="w-full bg-blue-500 text-white p-2 rounded">
Add Question
</button>

<hr>

<!-- CSV QUESTIONS -->
<input type="file" id="csvQ">
<button id="uploadQ" class="w-full bg-green-500 text-white p-2 rounded">
Upload Questions CSV
</button>

<button id="exportQ" class="w-full bg-gray-700 text-white p-2 rounded">
Export Questions CSV
</button>

<hr>

<!-- USERS CSV -->
<input type="file" id="csvUsers">
<button id="uploadUsers" class="w-full bg-purple-500 text-white p-2 rounded">
Import Users CSV
</button>

<hr>

<!-- LIST -->
<div id="list" class="space-y-2"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { 
  collection, addDoc, getDocs, deleteDoc, doc, updateDoc, setDoc, getDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ================= ADD QUESTION =================
addBtn.onclick = async ()=>{

 let data = {
   unit: unit.value.trim(),
   difficulty: difficulty.value.trim(),
   q: q.value.trim(),
   o: [o1.value.trim(),o2.value.trim(),o3.value.trim(),o4.value.trim()],
   a: Number(ans.value)
 };

 if(!data.q || data.o.includes("")){
   alert("Fill all fields");
   return;
 }

 await addDoc(collection(db,"questions"), data);

 alert("Question Added");
 load();
};

// ================= LOAD QUESTIONS =================
async function load(){

 list.innerHTML="Loading...";

 let snap = await getDocs(collection(db,"questions"));

 list.innerHTML="";

 snap.forEach(d=>{

  let data = d.data();

  let div = document.createElement("div");
  div.className="bg-gray-100 p-3 rounded";

  div.innerHTML = `
    <b>${data.q}</b><br>
    ${data.o.join(" | ")}<br>
    <span class="text-sm">Ans: ${data.a} | ${data.unit} | ${data.difficulty}</span>
    <div class="flex gap-2 mt-2">
      <button onclick="edit('${d.id}')" class="bg-yellow-400 px-2 rounded">Edit</button>
      <button onclick="del('${d.id}')" class="bg-red-500 text-white px-2 rounded">Delete</button>
    </div>
  `;

  list.appendChild(div);

 });
}

load();

// ================= DELETE =================
window.del = async(id)=>{
 await deleteDoc(doc(db,"questions",id));
 load();
};

// ================= EDIT =================
window.edit = async(id)=>{

 let newQ = prompt("New Question:");
 if(!newQ) return;

 await updateDoc(doc(db,"questions",id),{ q:newQ.trim() });
 load();
};

// ================= CSV QUESTIONS =================
uploadQ.onclick = ()=>{

 let file = csvQ.files[0];
 if(!file) return alert("Select file");

 let reader = new FileReader();

 reader.onload = async e=>{
  let lines = e.target.result.split("\n");

  for(let line of lines){

    let [q,o1,o2,o3,o4,a,unit,diff] = line.split(",");

    if(!q) continue;

    await addDoc(collection(db,"questions"),{
      q: q.trim(),
      o:[o1,o2,o3,o4].map(x=>x.trim()),
      a:Number(a),
      unit: unit.trim(),
      difficulty: diff.trim()
    });
  }

  alert("Questions Uploaded");
  load();
 };

 reader.readAsText(file);
};

// ================= EXPORT CSV =================
exportQ.onclick = async ()=>{

 let snap = await getDocs(collection(db,"questions"));

 let csv = "q,o1,o2,o3,o4,a,unit,difficulty\n";

 snap.forEach(d=>{
  let x = d.data();
  csv += `${x.q},${x.o[0]},${x.o[1]},${x.o[2]},${x.o[3]},${x.a},${x.unit},${x.difficulty}\n`;
 });

 let blob = new Blob([csv],{type:"text/csv"});
 let a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "questions.csv";
 a.click();
};

// ================= USERS CSV (FIXED) =================
uploadUsers.onclick = ()=>{

 let file = csvUsers.files[0];
 if(!file) return alert("Select file");

 let reader = new FileReader();

 reader.onload = async e=>{

  uploadUsers.innerText="Uploading...";

  let lines = e.target.result.split("\n");

  for(let line of lines){

    let [enroll,password,role] = line.split(",");

    if(!enroll) continue;

    enroll = enroll.trim();
    password = password.trim();

    let userRef = doc(db,"users",enroll);

    // 🔥 prevent duplicate
    let snap = await getDoc(userRef);
    if(snap.exists()){
      console.log("User exists:", enroll);
      continue;
    }

    let hash = CryptoJS.SHA256(password).toString();

    await setDoc(userRef,{
      enrollment: enroll,
      passwordHash: hash,
      role: role?.trim() || "student"
    });
  }

  uploadUsers.innerText="Import Users CSV";
  alert("Users Imported Successfully");
 };

 reader.readAsText(file);
};

</script>

</body>
</html>
