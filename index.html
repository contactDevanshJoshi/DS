<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-100 h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h2 class="text-xl font-bold text-center mb-4">DS Quiz Login</h2>

<form id="loginForm">
<input id="enrollment" placeholder="Enrollment" class="w-full p-2 border rounded mb-3">
<input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded mb-3">
<p id="errorMessage" class="text-red-500 text-sm mb-2"></p>
<button class="w-full bg-blue-500 text-white p-2 rounded">Login</button>
</form>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

loginForm.onsubmit = async(e)=>{
 e.preventDefault();

 let enroll = enrollment.value.trim();
 let pass = password.value.trim();

 let snap = await getDoc(doc(db,"users",enroll));

 if(!snap.exists()){
   errorMessage.innerText="User not found";
   return;
 }

 let user = snap.data();
 let hash = CryptoJS.SHA256(pass).toString();

 if(hash !== user.passwordHash){
   errorMessage.innerText="Wrong password";
   return;
 }

 localStorage.setItem("user",enroll);
 localStorage.setItem("role",user.role);

 location.href="dashboard.html";
};
</script>

</body>
</html>
