<!-- Index (Login) -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Quiz Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

  <div class="form-content text-center">

    <h1 class="text-2xl font-bold mb-2">DS Quiz App</h1>
    <p class="text-gray-500 mb-6">Login to continue</p>

    <form id="loginForm">

      <input id="enrollment" type="text" placeholder="Enrollment No"
        class="w-full p-3 border rounded mb-3">

      <input id="password" type="password" placeholder="Password"
        class="w-full p-3 border rounded mb-3">

      <p id="errorMessage" class="text-red-500 text-sm mb-2 hidden"></p>

      <button class="w-full bg-blue-500 text-white p-3 rounded">
        Login
      </button>

    </form>

  </div>

  <!-- Success UI (same concept) -->
  <div id="successState" class="hidden text-center">
    <h2 class="text-xl font-bold text-green-600">Login Successful</h2>
    <p id="enrollmentDisplay"></p>
  </div>

</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDx6abGpJdQltTmfzllb9DRQBHvMphFR0",
  authDomain: "ds-sem2.firebaseapp.com",
  projectId: "ds-sem2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 AUTO LOGIN (SESSION)
onAuthStateChanged(auth, (user)=>{
  if(user){
    window.location.href = "dashboard.html";
  }
});

// ================= LOGIN =================
const form = document.getElementById("loginForm");
const enrollment = document.getElementById("enrollment");
const password = document.getElementById("password");
const error = document.getElementById("errorMessage");

const formContent = document.querySelector(".form-content");
const successState = document.getElementById("successState");
const enrollmentDisplay = document.getElementById("enrollmentDisplay");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  let eVal = enrollment.value.trim();
  let pVal = password.value.trim();

  if(!eVal || !pVal){
    error.innerText = "Enter all fields";
    error.classList.remove("hidden");
    return;
  }

  let email = eVal + "@ds.com";

  try{

    await signInWithEmailAndPassword(auth, email, pVal);

    localStorage.setItem("user", eVal);

    formContent.style.display = "none";
    successState.classList.remove("hidden");
    enrollmentDisplay.innerText = eVal;

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    },1000);

  }catch(err){
    error.innerText = "Invalid Enrollment or Password";
    error.classList.remove("hidden");
  }

});

lucide.createIcons();

</script>

</body>
</html>
